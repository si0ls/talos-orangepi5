name: Build Talos for Orange Pi 5
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  build:
    permissions:
      actions: read
      contents: write
      issues: read
      packages: write
      pull-requests: read
    runs-on:
      - self-hosted
      - talos-orangepi5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unshallow
        run: |
          git fetch --prune --unshallow

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.repository_owner }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/arm64

      - name: Cache Kernel build
        id: cache-kernel-build
        uses: actions/cache@v3
        with:
          save-always: true
          path: kernel-build
          key: kernel-build-${{ hashFiles('kernel/Dockerfile') }}

      - name: Cache U-Boot build
        id: cache-u-boot-build
        uses: actions/cache@v3
        with:
          save-always: true
          path: u-boot-build
          key: u-boot-build-${{ hashFiles('u-boot/Dockerfile') }}

      - name: Cache installer go mod build
        id: cache-installer-gomod
        uses: actions/cache@v3
        with:
          save-always: true
          path: installer-gomod
          key: installer-gomod-${{ hashFiles('installer/Dockerfile') }}

      - name: Cache installer go build
        id: cache-installer-go
        uses: actions/cache@v3
        with:
          save-always: true
          path: installer-go
          key: installer-go-${{ hashFiles('installer/Dockerfile') }}

      - name: Inject Kernel build cache into buildx
        uses: reproducible-containers/buildkit-cache-dance@v2.1.4
        with:
          cache-source: kernel-build
          cache-target: /kernel/build
          skip-extraction: ${{ steps.cache-kernel-build.outputs.cache-hit }}

      - name: Inject U-Boot build cache into buildx
        uses: reproducible-containers/buildkit-cache-dance@v2.1.4
        with:
          cache-source: u-boot-build
          cache-target: /u-boot/build
          skip-extraction: ${{ steps.cache-u-boot-build.outputs.cache-hit }}

      - name: Inject installer go mod cache into buildx
        uses: reproducible-containers/buildkit-cache-dance@v2.1.4
        with:
          cache-source: installer-gomod
          cache-target: /.cache/gomod
          skip-extraction: ${{ steps.cache-installer-gomod.outputs.cache-hit }}

      - name: Inject installer go cache into buildx
        uses: reproducible-containers/buildkit-cache-dance@v2.1.4
        with:
          cache-source: installer-go
          cache-target: /.cache/go
          skip-extraction: ${{ steps.cache-installer-go.outputs.cache-hit }}

      - name: Build & push
        run: make build PUSH=true BUILD_ARGS="--cache-to=type=gha --cache-to=type=gha,mode=max"
