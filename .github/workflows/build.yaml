name: Build Talos for Orange Pi 5
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  build:
    permissions:
      actions: read
      contents: write
      issues: read
      packages: write
      pull-requests: read
    runs-on:
      - self-hosted
      - talos-orangepi5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Unshallow
        run: |
          git fetch --prune --unshallow

      - name: Metadata
        id: meta
        run: |
          echo "created=$(date --iso-8601=seconds)" >> $GITHUB_OUTPUT
          echo "version=$(git describe --tag --always --dirty)" >> $GITHUB_OUTPUT
          echo "talos_version=$(cd imager/talos; git describe --tag --always --dirty)" >> $GITHUB_OUTPUT
          echo "source_date_epoch=$(git log -1 --pretty=%ct)" >> $GITHUB_OUTPUT

      - name: Patch imager Talos
        run: |
          for patch in $(find ./imager/patches -name '*.patch' | sort); do
            patch -p1 -d ./imager/talos < $patch
          done

      - name: Set env
        run: |
          echo "USERNAME=${{ github.repository_owner }}" >> $GITHUB_ENV
          echo "REGISTRY=ghcr.io" >> $GITHUB_ENV
          echo "TAG=${{ steps.meta.outputs.version }}" >> $GITHUB_ENV
          echo "TALOS_VERSION=${{ steps.meta.outputs.talos_version }}" >> $GITHUB_ENV
          echo "SOURCE_DATE_EPOCH=${{ steps.meta.outputs.source_date_epoch }}" >> $GITHUB_ENV

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.repository_owner }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/arm64

      - name: Build and push U-Boot and Kernel
        uses: docker/bake-action@v4
        with:
          targets: system
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            *.labels.org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            *.labels.org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            *.labels.org.opencontainers.image.source=${{ github.repositoryUrl }}

      - name: Build and push Talos installer and imager
        uses: docker/bake-action@v4
        with:
          targets: talos
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            *.labels.org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            *.labels.org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            *.labels.org.opencontainers.image.source=${{ github.repositoryUrl }}
